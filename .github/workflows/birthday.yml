name: Daily Birthday Reminder

on:
  schedule:
    # 11:05 UTC = 08:05 em Fortaleza
    - cron: "5 11 * * *"
  workflow_dispatch:

jobs:
  send-birthday-notifications:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run birthday reminder script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_daily_birthdays.py

      - name: Commit updated notification log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/notification_log.json
          git diff --cached --quiet || git commit -m "chore: update notification log"
          git push